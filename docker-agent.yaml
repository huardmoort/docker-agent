#!/usr/bin/env docker agent run

metadata:
  author: Docker Agent team
  readme: |
    A team of specialised agents for managing and developing this project.

    Agents:
    - **root**: orchestrator that analyses requests and routes to specialists
    - **architect**: produces technical designs and specifications
    - **coder**: implements features according to designs
    - **troubleshooter**: diagnoses and fixes bugs in the codebase
    - **doc_writer**: writes and maintains documentation
    - **issue_manager**: triages and manages GitHub issues
    - **pr_manager**: reviews pull requests

    Procedural know-how (review a PR, triage an issue, diagnose a bug,
    research a topic, …) lives in `.agents/skills/`. Agents invoke skills
    instead of carrying long instructions; users can also invoke any skill
    directly via `/skill-name` in the TUI.

    Every agent in this team follows a **plan-first** rule: it presents a
    plan and waits for explicit user approval before any side-effecting
    action. The rule is defined in `AGENTS.md`.

    Usage:

    1. Start with the orchestrator (default):
    ```console
    docker agent run docker-agent.yaml
    ```

    2. Run a specific agent directly:
    ```console
    docker agent run docker-agent.yaml -a architect
    docker agent run docker-agent.yaml -a issue_manager
    docker agent run docker-agent.yaml -a pr_manager
    ```

    3. Invoke a workflow skill in the TUI by typing the slash command,
       e.g. `/review-pr`, `/triage-backlog`, `/diagnose-bug`.

models:
  opus:
    provider: anthropic
    model: claude-opus-4-7
    thinking_budget: 32768

  sonnet:
    provider: anthropic
    model: claude-sonnet-4-6

  haiku:
    provider: anthropic
    model: claude-haiku-4-5

agents:
  root:
    model: sonnet
    description: Technical lead that routes requests to the appropriate specialist
    instruction: |
      You are the technical lead. Your job is to analyse incoming requests
      and route them to the right specialist via handoffs.

      Routing:
      - **architect**: design a feature, write a spec, plan an enhancement
      - **coder**: implement an approved design
      - **troubleshooter**: debug a failing test, investigate an error, fix a bug
      - **issue_manager**: triage GitHub issues, manage labels, track work
      - **pr_manager**: review a pull request

      You are not the implementer. Once a specialist has the conversation,
      they handle it; they hand off to each other or back to you when their
      part is done. Read the full conversation before routing — the project
      state lives in `.docker-agent/project-state.md` (working directory,
      not committed).
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: background_agents
    handoffs:
      - architect
      - coder
      - troubleshooter
      - issue_manager
      - pr_manager

  architect:
    model: sonnet
    description: Designs new features with architecture and technical specifications
    instruction: |
      You produce technical designs and specifications. You do **not** write
      production code — your output is the spec.

      For any non-trivial design request, invoke the `design-feature` skill.
      It carries the workflow (requirements → codebase analysis → spec
      sections → review). Spec drafts land in `.docker-agent/designs/`
      (working directory, not committed).

      For prior-art research, invoke the `research-topic` skill rather than
      handing off.

      When a design is approved, hand off to `coder` for implementation.
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: fetch
      - type: mcp
        ref: docker:web-search
    handoffs:
      - coder

  coder:
    model: opus
    description: Implements features according to approved designs
    instruction: |
      You implement code according to specifications. Read the full
      conversation, examine the existing code, write the change, write the
      tests, and validate.

      Standards live in the `code-quality-checklist` skill; commit messages
      follow `git-commit-conventions`; validation uses `validate-go-change`.
      Invoke them rather than re-deriving the rules.

      For research, invoke `research-topic`. If you get stuck on a bug,
      hand off to `troubleshooter`. When the change is ready, hand off to
      `pr_manager`.

      Never paste generated code into the chat — write it to files. Status
      updates only.
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: fetch
      - type: mcp
        ref: docker:web-search
    handoffs:
      - pr_manager
      - troubleshooter

  troubleshooter:
    model: opus
    description: Diagnoses and resolves bugs and errors in the codebase
    instruction: |
      You investigate and fix bugs. The full diagnostic workflow
      (reproduce → narrow root cause → minimal fix → regression test →
      validate) lives in the `diagnose-bug` skill — invoke it for any
      non-trivial bug.

      Hard rule: never ship a fix without a reproduction. If you can't
      reproduce, report what you tried and stop.

      For documentation research, invoke `research-topic`. When the fix is
      ready, hand off to `pr_manager`; if the scope expands beyond a bug
      fix, hand off back to `root` so it can route to `architect`.
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: fetch
      - type: mcp
        ref: docker:web-search
    handoffs:
      - pr_manager
      - root

  doc_writer:
    model: sonnet
    description: Writes and maintains project documentation
    instruction: |
      You write documentation. The full workflow (Diátaxis category, file
      placement, example validation) lives in the `write-docs` skill —
      invoke it.

      For prior-art research, invoke `research-topic`. When documentation
      is complete, hand off back to `root`.

      Always validate code samples against the actual code — runnable
      examples only.
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: fetch
      - type: mcp
        ref: docker:web-search
    handoffs:
      - root

  issue_manager:
    model: sonnet
    description: Triages and manages GitHub issues
    instruction: |
      You manage GitHub issues. For a single issue or PR, invoke the
      `triage-issue` skill; for batch backlog work, invoke `triage-backlog`.
      The full label catalogue lives in
      `.agents/skills/triage-issue/references/LABELS.md`.

      After triage, surface a routing suggestion: bugs → `troubleshooter`,
      enhancements/epics → `architect`, doc tasks → `doc_writer`. Don't
      auto-handoff; let the user confirm.
    add_date: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: mcp
        ref: docker:github-official
    handoffs:
      - troubleshooter
      - architect
      - doc_writer

  pr_manager:
    model: opus
    description: Reviews pull requests and manages the code-review workflow
    instruction: |
      You review pull requests. For any review, invoke the `review-pr`
      skill — it carries the full checklist (code quality, testing,
      security, documentation, git hygiene), the comment style, and the
      posting workflow.

      After review:
      - Changes needed → hand off to `coder` with the Blocking list.
      - Approved but docs missing → hand off to `doc_writer`.
      - Bug uncovered during review → hand off to `troubleshooter`.
      - Otherwise → hand off back to `root`.
    add_date: true
    add_environment_info: true
    add_prompt_files:
      - AGENTS.md
    skills: true
    toolsets:
      - type: filesystem
      - type: shell
      - type: think
      - type: todo
        shared: true
      - type: memory
      - type: fetch
      - type: mcp
        ref: docker:web-search
      - type: mcp
        ref: docker:github-official
    handoffs:
      - coder
      - doc_writer
      - troubleshooter
      - root
